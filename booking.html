<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Room</title>
</head>

<body>
    <div class="image-container" style="background-color: wheat;">
        <font size="3">
            <br>
            <h2>
                <center><b><u>BOOKING FORM</u></b></center>
            </h2>
            <br>
            <form  class="text" name="frm1" style="margin-left: 10%;">
                <label for="name">  Enter your name : </label>
                <input type="text" id="name" size="70" placeholder="eg. Rahul Sahu">
                <br>
                <br>
                <label for="d">  Date : </label>
                <input type="date" id="d" size="70">
                <br>
                <br>
                <label for="r">  Room Category</label>
                <select id="r">
                    <option value="Royal Suite">Royal Suite</option>
                    <option value="Heritage Suite">Heritage Suite</option>
                    <option value="Palace Suite">Palace Suite</option>
                    <option value="Colonial Suite">Colonial Suite</option>
                    <option value="Garden Room">Garden Room</option>
                    <option value="Maharaja Room">Maharaja Room</option>
                    <option value="Deluxe Room">Deluxe Room</option>
                </select>
                <br>
                <br>
                <label for="n">  Number of people : </label>
                <input type="number" id="n" size="70" placeholder="eg. 2">
                <br>
                <br>
                <button type="reset">Reset</button>
                <button type="submit">Submit</button>
            </form>
        </font>
        <br>
        <br>
        <img class="image" src="images/room2.jpg" alt="Room" height="230" width="840">
    </div>
</body>

</html>
